version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: harbin-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: goodluck@123
    volumes:
      - mongodb_data:/data/db
    networks:
      - harbin-network

  redis:
    image: redis:7-alpine
    container_name: harbin-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass goodluck@123
    volumes:
      - redis_data:/data
    networks:
      - harbin-network

volumes:
  mongodb_data:
  redis_data:

networks:
  harbin-network:
    driver: bridge
